description: >-
  Coder is a self-hosted platform that allows developers to access a development environment directly from their browser. It provides a seamless way to set up, access, and manage development workspaces.


  **Features:**

  - Browser-based development environments
  - Built-in PostgreSQL database for configuration and state storage
  - Docker socket integration for workspace provisioning
  - Automatic workspace scaling and health checks
  - Full code editor with terminal access


  **Architecture:**

  This app runs two services:
    - **Coder**: The main application server listening on port 7080
    - **PostgreSQL**: Database for storing workspaces, users, and configuration


  **Setup Instructions:**

  1. After starting the app, access Coder at http://umbrel.local:7080 (or your device IP:7080)
  2. Complete the initial setup wizard to configure your admin account
  3. Set the CODER_ACCESS_URL environment variable to your device's IP address or domain
  4. Create and manage development workspaces from the web interface


  **Configuration:**

  - `POSTGRES_USER`: Database user (default: username)
  - `POSTGRES_PASSWORD`: Database password (default: password)
  - `POSTGRES_DB`: Database name (default: coder)
  - `CODER_ACCESS_URL`: URL where workspaces can reach the Coder server (required for non-Docker templates)


  ⚠️ **Important:** Set a strong POSTGRES_PASSWORD before deploying to production. The CODER_ACCESS_URL must be set to your device's IP address or domain for workspaces to function properly.
