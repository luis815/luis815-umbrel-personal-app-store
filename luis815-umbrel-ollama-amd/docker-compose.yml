version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: luis815-umbrel-ollama-amd_luis815-umbrel-ollama-amd_1
      APP_PORT: 11434
      PROXY_AUTH_ADD: 'false'
  luis815-umbrel-ollama-amd:
    image: ollama/ollama:0.17.4-rocm
    environment:
      OLLAMA_ORIGINS: '*'
      OLLAMA_CONTEXT_LENGTH: 8192
      HSA_OVERRIDE_GFX_VERSION: '9.0.10'
      OLLAMA_VRAM_OVERRIDE: 8589934592
      GPU_MAX_ALLOC_PERCENT: 100
    group_add:
      - "44"
      - "991"
    volumes:
      - ${APP_DATA_DIR}/data:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    restart: on-failure
