version: "3.0.3"
port: 2604
description: >-
  Gluetun Proxy provides a secure VPN tunnel with built-in HTTP/HTTPS forwarding capabilities. This app includes a status page to monitor VPN and proxy connectivity in real-time.


  **Features:**

  - VPN proxy with HTTP/HTTPS forwarding on port 8888
  - Real-time status page showing VPN and proxy connectivity
  - Automatic health checks for both VPN and proxy services
  - Supports custom OpenVPN configurations


  **Configuration:**

  The app runs two services:
    - **VPN Service**: Provides the VPN tunnel and HTTP proxy functionality on port 8888
    - **Status Page**: Nginx-based monitoring page showing VPN and proxy status


  **Status Page:**

  Access the status page at http://umbrel.local:2604 (or your device IP:2604) to see real-time VPN and proxy connectivity status.


  **Setup Instructions:**

  1. After starting the app, configure your OpenVPN provider credentials
  2. Configure VPN_SERVICE_PROVIDER and other environment variables as needed
  3. The proxy will be available at http://umbrel.local:8888 (or your device IP:8888)


  ⚠️ **Important:** This app requires proper VPN provider configuration. Ensure you have a valid OpenVPN provider configured before use.
