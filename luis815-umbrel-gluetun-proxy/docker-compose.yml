version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: luis815-umbrel-gluetun-proxy_vpn_1
      APP_PORT: 80
      PROXY_AUTH_ADD: 'false'

  vpn:
    image: qmcgaw/gluetun:v3
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/run/secrets/us.protonvpn.udp.ovpn
      - OPENVPN_USER_SECRETFILE=/run/secrets/vpn_user
      - OPENVPN_PASSWORD_SECRETFILE=/run/secrets/vpn_pass
      - HTTPPROXY=on
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    volumes:
      - ${APP_DATA_DIR}/data:/gluetun
      - ${UMBREL_ROOT}/home/Downloads/vpn/us.protonvpn.udp.ovpn:/run/secrets/us.protonvpn.udp.ovpn:ro
      - ${UMBREL_ROOT}/home/Downloads/vpn/vpn_user.txt:/run/secrets/vpn_user:ro
      - ${UMBREL_ROOT}/home/Downloads/vpn/vpn_pass.txt:/run/secrets/vpn_pass:ro
    restart: on-failure

  status-page:
    image: nginx:1.29.8-alpine
    container_name: vpn-status
    network_mode: "service:vpn"
    command: >
      /bin/sh -c "
      while true; do
        CURRENT_IP=$$(wget -qO- http://ifconfig.me || echo 'DISCONNECTED');
        if [ \"$$CURRENT_IP\" != 'DISCONNECTED' ]; then
          V_STAT=\"ONLINE ($$CURRENT_IP)\";
        else
          V_STAT='OFFLINE';
        fi;
        if timeout 1 bash -c "echo > /dev/tcp/127.0.0.1/8888" 2>/dev/null; then
          P_STAT='ONLINE';
        else
          P_STAT='OFFLINE';
        fi;
        echo \"<html><body style='background:#121212;color:#00ff00;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;'><h1>VPN: $$V_STAT | PROXY: $$P_STAT</h1></body></html>\" > /usr/share/nginx/html/index.html;
        sleep 300;
      done & nginx -g 'daemon off;'"
    depends_on:
      - vpn
    restart: on-failure
