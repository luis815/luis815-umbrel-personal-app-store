version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: luis815-umbrel-gluetun-proxy_vpn_1
      APP_PORT: 80
      PROXY_AUTH_ADD: 'false'

  vpn:
    image: qmcgaw/gluetun:v3
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # PROTONVPN
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/run/secrets/us.protonvpn.udp.ovpn
      - OPENVPN_USER_SECRETFILE=/run/secrets/vpn_user
      - OPENVPN_PASSWORD_SECRETFILE=/run/secrets/vpn_pass
      # HTTP PROXY 8888
      - HTTPPROXY=on
      # SOCKS5 PROXY 1080
      - SOCKS5=on
      - SOCKS5_LOG=on
      - SOCKS5_PORT=1080
      - SOCKS5_LISTENING_ADDRESS=:1080
      # CONTROL SERVER
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    volumes:
      - ${APP_DATA_DIR}/data:/gluetun
      - ${UMBREL_ROOT}/home/Downloads/vpn/us.protonvpn.udp.ovpn:/run/secrets/us.protonvpn.udp.ovpn:ro
      - ${UMBREL_ROOT}/home/Downloads/vpn/vpn_user.txt:/run/secrets/vpn_user:ro
      - ${UMBREL_ROOT}/home/Downloads/vpn/vpn_pass.txt:/run/secrets/vpn_pass:ro
    restart: on-failure

  status-page:
    image: nginx:1.29.8-alpine
    network_mode: "service:vpn"
    command: |
      /bin/sh -c "echo '<html><body style=\"background:#121212;color:#00ff00;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;\"><h1>Server is Online</h1></body></html>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"
    depends_on:
      - vpn
    restart: on-failure
